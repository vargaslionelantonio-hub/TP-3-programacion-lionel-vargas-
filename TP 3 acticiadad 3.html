<body>
    <script>
        let nombredelequipo = prompt("ingresa el nombre del equipo");
        let dia = 0


        switch ("nombredelequipo"){

                } else if  (prioridad == "2"){
                        prioridad = "media";

                }else if (prioridad == "3"){
                    prioridad = "baja";

                }else {
                    alert("prioridad no valida");

                }
            case 2:
                if (dia < 3){
                    alert("Seguimiento normal");

                    break;
                }
            case 3:
                if (dia < 7){

                    b = "Realizar control del estado de la tarea";

                    break;
                }
            case 4: 
                if (dia > 7){
                    alert("Realizar control del estado de la tarea");
                    c = "Realizar control del estado de la tarea";
                    alert("nombre del equipo: " + nombredelequipo + "\n prioridad: " + prioridad + "\n dias transcurridos: " + dia + "\n control del estado de la tarea: " + c);
                    break;
                }
            default:
                alert("numero no valido");
                break;
            }
    </script>
